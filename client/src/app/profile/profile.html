<div class="profile-page">

    <h1 class="title">Profile</h1>

    <!-- user -->
    <div class="profile-card">
        <div class="avatar">
            {{ user?.name?.substring(0,1) }}
        </div>

        <div class="user-info">
            <p class="name">{{ user?.name || 'Anurag Singh' }}</p>
            <p class="email">{{ user?.email || 'anurag@email.com' }}</p>
            <p class="joined">Member since Apr 2026</p>
        </div>
    </div>

    <!-- stats -->
    <div class="stats-grid">

        <div class="stat-card">
            <span class="stat-label">Total Rides</span>
            <p class="stat-value">23</p>
        </div>

        <div class="stat-card">
            <span class="stat-label">Distance Travelled</span>
            <p class="stat-value">148 km</p>
        </div>

        <div class="stat-card">
            <span class="stat-label">Total Spent</span>
            <p class="stat-value">₹ 4,320</p>
        </div>

        <div class="stat-card">
            <span class="stat-label">Preferred Ride</span>
            <p class="stat-value">Mini</p>
        </div>

    </div>

    <!-- quick actions -->
    <div class="actions-section">
        <h2 class="section-title">Quick Actions</h2>

        <div class="actions-grid">

            <button class="action-card">
                <span class="action-title">Book Ride</span>
                <span class="action-subtitle">Request a new cab</span>
            </button>

            <button class="action-card">
                <span class="action-title">My Rides</span>
                <span class="action-subtitle">View ride history</span>
            </button>

        </div>
    </div>

</div>
