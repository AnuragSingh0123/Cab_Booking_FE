<form #loginForm="ngForm" (ngSubmit)="login(loginForm)">

    <div class="login-wrapper">

        <div class="login-card">

            <div class="login-header">

                <h1 class="login-title">
                    Login
                </h1>

                <p class="login-subtitle">
                    Welcome back! Please login to continue
                </p>

            </div>

            <!-- Email -->
            <div class="form-group">

                <label class="form-label">
                    Email Address
                </label>

                <input
                    class="form-input"
                    name="email"
                    #email="ngModel"
                    email
                    required
                    ngModel
                    type="text"
                    placeholder="Enter your email"
                >

                <div
                    *ngIf="email.invalid && (email.touched || loginForm.submitted)"
                    class="error-text"
                >
                    <div *ngIf="email.errors?.['required']">
                        Email is required
                    </div>

                    <div *ngIf="email.errors?.['email']">
                        Enter a valid email
                    </div>
                </div>

            </div>

            <!-- Password -->
            <div class="form-group">

                <label class="form-label">
                    Password
                </label>

                <input
                    class="form-input"
                    name="password"
                    #password="ngModel"
                    required
                    ngModel
                    minlength="6"
                    type="password"
                    placeholder="Enter your password"
                >

                <div
                    *ngIf="password.invalid && (password.touched || loginForm.submitted)"
                    class="error-text"
                >
                    <div *ngIf="password.errors?.['required']">
                        Password is required
                    </div>

                    <div *ngIf="password.errors?.['minlength']">
                        Password must be at least 6 characters
                    </div>
                </div>

            </div>

            <!-- Button -->
            <button
                type="submit"
                class="login-btn"
            >
                Login
            </button>

            <!-- Bottom -->
            <div class="bottom-text">

                Don’t have an account?

                <a
                    routerLink="/sign-up"
                    class="signup-link"
                >
                    Sign Up
                </a>

            </div>

        </div>

    </div>

</form>
