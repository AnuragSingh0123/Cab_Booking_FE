<header>
  <nav
    style="
      display: flex;
      justify-content: space-between;
      padding: 20px 40px;
      border-bottom: 1px solid black;
      align-items: center;
    "
  >
    <!-- Left -->
    <div style="display: flex; gap: 30px; align-items: center">
      <div routerLink="" style="cursor: pointer">
        <img src="" alt="Logo" />
      </div>

      <div style="display: flex; gap: 10px">
        @if (!user?.isLoggedIn) {
          <a
            routerLink="sign-up"
            [queryParams]="{ role: 'driver' }"
            style="text-decoration: none; font-weight: 500; color: black"
          >
            Earn
          </a>
        }

        <a
          routerLink="about"
          style="text-decoration: none; font-weight: 500; color: black"
        >
          About
        </a>
      </div>
    </div>

    <!-- Right -->
    <div style="position: relative">
  @if (!user?.isLoggedIn) {
    <div style="display: flex; gap: 20px">
      <a
        routerLink="login"
        style="text-decoration: none; font-weight: 500; color: black"
      >
        Log in
      </a>

      <a
        routerLink="sign-up"
        [queryParams]="{ role: 'rider' }"
        style="text-decoration: none; font-weight: 500; color: black"
      >
        Sign up
      </a>
    </div>
  } @else {
    <div
      (click)="toggleMenu()"
      style="
        display: flex;
        align-items: center;
        gap: 12px;
        cursor: pointer;
      "
    >
      <div
        style="
          width: 42px;
          height: 42px;
          border-radius: 50%;
          background: black;
          color: white;
          display: flex;
          align-items: center;
          justify-content: center;
          font-weight: bold;
          font-size: 18px;
        "
      >
        {{ firstLetter }}
      </div>

      <span style="font-weight: 500">{{ user.name }}</span>
    </div>

    @if (showMenu) {
      <div
        style="
          position: absolute;
          top: 55px;
          right: 0;
          width: 180px;
          background: white;
          border: 1px solid #ddd;
          border-radius: 10px;
          box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
          overflow: hidden;
          z-index: 100;
        "
      >
        <div
          routerLink="profile"
          style="
            padding: 14px 18px;
            cursor: pointer;
            font-weight: 500;
            border-bottom: 1px solid #eee;
          "
        >
          View Profile
        </div>

        <div
          (click)="logout()"
          style="
            padding: 14px 18px;
            cursor: pointer;
            color: red;
            font-weight: 500;
          "
        >
          Logout
        </div>
      </div>
    }
  }
</div>
  </nav>
</header>
