<header class="header">

  <nav class="navbar">

    <div class="nav-left">

      <div routerLink="" class="logo">
        <h1>CogRide</h1>
      </div>

      <div class="nav-links">

        @if (!auth.isLoggedIn()) {

          <a routerLink="driver-signup">
            Earn
          </a>

        }

        <a routerLink="about">
          About
        </a>

      </div>

    </div>

    <div class="nav-right">

      @if (!auth.isLoggedIn()) {

        <div class="auth-links">

          <a routerLink="login" class="login-btn">
            Log in
          </a>

          <a
            routerLink="sign-up"
            class="signup-btn"
          >
            Sign up
          </a>

        </div>

      } @else {

        <div
          (click)="toggleMenu()"
          class="profile-btn"
        >

          <div class="avatar">
            {{ firstLetter }}
          </div>

          <span class="username">
            {{ auth.user()?.name }}
          </span>

        </div>

        @if (showMenu) {

          <div class="dropdown">

            <div
              id="tMenu"
              (click)="toggleMenu()"
              routerLink="profile"
            >
              Account Settings
            </div>

            @if(auth.user()?.role === 'rider'){

              <div
                id="tMenu"
                (click)="toggleMenu()"
                routerLink="my-trips"
              >
                My Trips
              </div>

            }

            <div
              id="tMenu"
              (click)="logout()"
              class="logout"
            >
              Logout
            </div>

          </div>

        }

      }

    </div>

  </nav>

</header>
