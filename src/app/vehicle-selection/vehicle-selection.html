<div class="vehicle-page">
  <h1 class="title">Choose a ride</h1>

  <p class="route">
    {{ ride().pickup | titlecase }}
    →
    {{ ride().drop | titlecase }}
  </p>

  <p class="meta-info">
    Distance: {{ ride().distance || '--' }} km • Estimated Time: {{ ride().duration || '--' }} min
  </p>

  <div class="vehicle-wrapper">
    <div class="form-container">
      @for (vehicle of vehicles; track vehicle.name) {
        <label class="vcard" [class.active]="selectedValue === vehicle.name">
          <input type="radio" name="vehicle" [value]="vehicle.name" [(ngModel)]="selectedValue" />

          <div class="vcard-content">
            <div class="left">
              <img [src]="vehicle.image" />

              <div class="vehicle-info">
                <span class="name">
                  {{ vehicle.name }}
                </span>

                <span class="meta"> {{ vehicle.desc }} • {{ vehicle.seats }} seats </span>
              </div>
            </div>

            <p class="price">₹ {{ calculateFare(vehicle) | number }}</p>
          </div>
        </label>
      }

      <button (click)="checkoutDetails()" class="checkout-btn" [disabled]="!selectedValue">
        Go to Checkout
      </button>
    </div>
  </div>
</div>
